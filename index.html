<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleet Summary</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a2e;
      background: #f4f6fb;
      padding: 24px;
    }

    /* ── Page header ──────────────────────────────────────────── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1f3864;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-header h1 svg {
      width: 26px;
      height: 26px;
      stroke: #2e75b6;
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #2e75b6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .refresh-btn:hover { background: #1f5c9a; }
    .refresh-btn:disabled { background: #9ab4d0; cursor: not-allowed; }

    .refresh-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }

    /* ── Stat cards ───────────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 18px 20px;
      border-left: 4px solid #2e75b6;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .stat-card.green  { border-left-color: #1d9e75; }
    .stat-card.amber  { border-left-color: #ba7517; }
    .stat-card.gray   { border-left-color: #888; }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #1f3864;
      line-height: 1;
    }

    /* ── Table section ────────────────────────────────────────── */
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: #1f3864;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title span {
      display: inline-block;
      background: #e8f0fb;
      color: #2e75b6;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── Search bar ───────────────────────────────────────────── */
    .search-bar {
      margin-bottom: 12px;
    }

    .search-bar input {
      width: 100%;
      max-width: 320px;
      padding: 8px 12px;
      border: 1px solid #d0d9e8;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-bar input:focus { border-color: #2e75b6; }

    /* ── Vehicle table ────────────────────────────────────────── */
    .table-wrap {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #1f3864;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 12px 16px;
      text-align: left;
    }

    thead th:last-child { text-align: center; }

    tbody tr {
      border-bottom: 1px solid #eef1f7;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7f9fd; }

    tbody td {
      padding: 12px 16px;
      font-size: 13px;
      color: #333;
      vertical-align: middle;
    }

    tbody td:last-child { text-align: center; }

    .vehicle-name {
      font-weight: 600;
      color: #1f3864;
    }

    .vehicle-serial {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    /* ── Status badge ─────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-active   { background: #e1f5ee; color: #1d9e75; }
    .badge-idle     { background: #fff3cd; color: #ba7517; }
    .badge-stopped  { background: #f0f0f0; color: #666; }

    .badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── Map link ─────────────────────────────────────────────── */
    .map-link {
      color: #2e75b6;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
    }

    .map-link:hover { text-decoration: underline; }

    /* ── Loading & error states ───────────────────────────────── */
    .state-box {
      background: #fff;
      border-radius: 10px;
      padding: 48px 24px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .state-box svg {
      width: 40px;
      height: 40px;
      stroke: #2e75b6;
      margin-bottom: 12px;
    }

    .state-box p {
      color: #555;
      font-size: 14px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #d6e4f0;
      border-top-color: #2e75b6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 20px 24px;
      color: #b91c1c;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    /* ── No results ───────────────────────────────────────────── */
    .no-results {
      padding: 32px 16px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }

    /* ── Last updated ─────────────────────────────────────────── */
    .last-updated {
      font-size: 11px;
      color: #aaa;
      text-align: right;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- Page header -->
  <div class="page-header">
    <h1>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="1" y="3" width="15" height="13" rx="1"/>
        <path d="M16 8h4l3 4v4h-7V8z"/>
        <circle cx="5.5" cy="18.5" r="2.5"/>
        <circle cx="18.5" cy="18.5" r="2.5"/>
      </svg>
      Fleet Summary
    </h1>
    <button class="refresh-btn" id="refreshBtn" aria-label="Refresh fleet data">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Refresh
    </button>
  </div>

  <!-- Error banner -->
  <div class="error-box" id="errorBox" role="alert"></div>

  <!-- Stat cards -->
  <div class="stats-grid" id="statsGrid">
    <div class="state-box" style="grid-column:1/-1">
      <div class="spinner" role="status" aria-label="Loading fleet data"></div>
      <p>Loading fleet data…</p>
    </div>
  </div>

  <!-- Vehicle table -->
  <div id="tableSection" style="display:none">
    <div class="section-title">
      Vehicles
      <span id="vehicleCount">0</span>
    </div>

    <div class="search-bar">
      <input
        type="search"
        id="searchInput"
        placeholder="Search by name or serial…"
        aria-label="Search vehicles"
      />
    </div>

    <div class="table-wrap">
      <table aria-label="Vehicle list">
        <thead>
          <tr>
            <th scope="col">Vehicle</th>
            <th scope="col">Status</th>
            <th scope="col">Speed</th>
            <th scope="col">Last seen</th>
            <th scope="col">Action</th>
          </tr>
        </thead>
        <tbody id="vehicleBody"></tbody>
      </table>
      <div class="no-results" id="noResults" style="display:none">No vehicles match your search.</div>
    </div>

    <p class="last-updated" id="lastUpdated"></p>
  </div>

  <script src="main.js"></script>
</body>
</html>
